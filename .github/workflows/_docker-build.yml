name: Reusable Docker build

on:
  workflow_call:
    inputs:
      mode:
        description: "Build-Modus: 'release' (SemVer+latest) oder 'manual' (Tag via inputs.version)"
        required: true
        type: string
      version:
        description: "Image-Tag für manuellen Run (wird ignoriert, wenn mode='release')"
        required: false
        type: string
        default: "0.0.0-dev"
      push:
        description: "Nur für mode='manual': Images nach GHCR pushen"
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.mode }}" in
            release|manual) ;;
            *)
              echo "::error::Invalid inputs.mode='${{ inputs.mode }}'. Allowed values: release | manual"
              exit 1
              ;;
          esac

      - name: Compute image namespace (lowercase)
        id: img
        shell: bash
        run: |
          set -euo pipefail
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "REPO_LC=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LC}-backend" >> "$GITHUB_OUTPUT"
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LC}-frontend" >> "$GITHUB_OUTPUT"
          echo "SOURCE_LABEL=org.opencontainers.image.source=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Compute push flag
        id: flags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.mode }}" == "release" || "${{ inputs.push }}" == "true" ]]; then
            echo "PUSH=true" >> "$GITHUB_OUTPUT"
          else
            echo "PUSH=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: ${{ steps.flags.outputs.PUSH == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Manual runs: avoid docker/metadata-action (may require GitHub API/credentials in `act`).
      - name: Fallback tags (manual)
        id: fallback
        if: ${{ inputs.mode == 'manual' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "BACKEND=${{ steps.img.outputs.BACKEND_IMAGE }}:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "FRONTEND=${{ steps.img.outputs.FRONTEND_IMAGE }}:${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "LABELS=${{ steps.img.outputs.SOURCE_LABEL }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (backend)
        id: meta_backend
        if: ${{ inputs.mode == 'release' }}
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ steps.img.outputs.BACKEND_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Docker metadata (frontend)
        id: meta_frontend
        if: ${{ inputs.mode == 'release' }}
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ steps.img.outputs.FRONTEND_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infrastructure/backend/Dockerfile
          push: ${{ steps.flags.outputs.PUSH == 'true' }}
          tags: ${{ inputs.mode == 'release' && steps.meta_backend.outputs.tags || steps.fallback.outputs.BACKEND }}
          labels: ${{ inputs.mode == 'release' && steps.meta_backend.outputs.labels || steps.fallback.outputs.LABELS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infrastructure/frontend/Dockerfile
          push: ${{ steps.flags.outputs.PUSH == 'true' }}
          tags: ${{ inputs.mode == 'release' && steps.meta_frontend.outputs.tags || steps.fallback.outputs.FRONTEND }}
          labels: ${{ inputs.mode == 'release' && steps.meta_frontend.outputs.labels || steps.fallback.outputs.LABELS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

